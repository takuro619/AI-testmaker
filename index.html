<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIテストメーカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            FileText, Send, Download, Loader2, CheckCircle2, AlertCircle, Type, 
            ListOrdered, PencilLine, Languages, MousePointer2, Plus, Trash2, 
            ListPlus, Settings, FileCode, ChevronUp, ChevronDown 
        } = LucideReact;

        // アイコン表示用のコンポーネント
        const IconWrapper = ({ icon: IconNode, className }) => {
            return <IconNode className={className} />;
        };

        function App() {
            const [testSets, setTestSets] = useState([]);
            const [currentTarget, setCurrentTarget] = useState("");
            const [currentType, setCurrentType] = useState("fill_blank");
            const [currentCount, setCurrentCount] = useState(5);
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);
            const [apiKey, setApiKey] = useState(""); // セキュリティのため入力式に変更

            const questionTypes = [
                { id: 'reorder', label: '整序', icon: ListOrdered },
                { id: 'fill_blank', label: '穴埋め', icon: Type },
                { id: 'translation_en', label: '和文英訳', icon: PencilLine },
                { id: 'translation_jp', label: '日本語訳', icon: Languages },
                { id: 'multiple_choice', label: '穴埋め(4択)', icon: MousePointer2 },
            ];

            const addTestSet = () => {
                if (!currentTarget.trim()) { setError("目標を入力してください。"); return; }
                const typeObj = questionTypes.find(t => t.id === currentType);
                setTestSets([...testSets, {
                    id: crypto.randomUUID(),
                    target: currentTarget,
                    typeId: currentType,
                    typeLabel: typeObj.label,
                    count: currentCount === "" ? 5 : currentCount
                }]);
                setCurrentTarget("");
                setError(null);
            };

            const removeTestSet = (id) => setTestSets(testSets.filter(s => s.id !== id));

            const moveSet = (index, direction) => {
                const newSets = [...testSets];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newSets.length) return;
                [newSets[index], newSets[targetIndex]] = [newSets[targetIndex], newSets[index]];
                setTestSets(newSets);
            };

            const generateBulkTest = async () => {
                if (!apiKey) { setError("Gemini APIキーを入力してください。"); return; }
                if (testSets.length === 0) { setError("構成を最低1つ追加してください。"); return; }
                setLoading(true); setError(null); setResults(null);

                const systemPrompt = `あなたは優秀な語学教師です。解答(answer)はピリオドを含めた完全な英文。整序問題は [word1 / word2] の形式。日本語訳(translation)に記号は含めない。`;
                const userPrompt = testSets.map((s, i) => `セクション${i+1}: 目標「${s.target}」、形式「${s.typeLabel}」、問題数「${s.count}問」`).join("\n");

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userPrompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        sections: {
                                            type: "ARRAY",
                                            items: {
                                                type: "OBJECT",
                                                properties: {
                                                    sectionTitle: { type: "STRING" },
                                                    type: { type: "STRING" },
                                                    questions: {
                                                        type: "ARRAY",
                                                        items: {
                                                            type: "OBJECT",
                                                            properties: {
                                                                id: { type: "NUMBER" },
                                                                text: { type: "STRING" },
                                                                translation: { type: "STRING" },
                                                                answer: { type: "STRING" },
                                                                options: { type: "ARRAY", items: { type: "STRING" } },
                                                                explanation: { type: "STRING" }
                                                            }
                                                        }
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        })
                    });
                    const data = await response.json();
                    const resultText = data.candidates[0].content.parts[0].text;
                    setResults(JSON.parse(resultText));
                } catch (err) {
                    setError("生成に失敗しました。キーを確認してください。");
                } finally {
                    setLoading(false);
                }
            };

            const downloadAsTxt = () => {
                if (!results) return;
                let content = "===== テスト問題 =====\n\n";
                results.sections.forEach((s) => {
                    content += `【${s.sectionTitle}】\n`;
                    s.questions?.forEach((q, i) => {
                        content += `${i + 1}. ${q.translation}\n   > ${q.text}\n`;
                    });
                });
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "test.txt";
                a.click();
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="flex items-center gap-3 mb-8">
                            <div className="bg-indigo-600 p-2 rounded-lg"><IconWrapper icon={ListPlus} className="text-white w-6 h-6" /></div>
                            <div>
                                <h1 className="text-2xl font-bold">AIテストメーカー</h1>
                                <p className="text-xs text-slate-500">Gemini 1.5 Flash 連携</p>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <aside className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border">
                                    <h3 className="font-bold mb-4 flex items-center gap-2"><IconWrapper icon={Settings} className="w-4 h-4 text-indigo-600" /> API設定</h3>
                                    <input 
                                        type="password" 
                                        placeholder="Gemini API Key" 
                                        className="w-full p-2 bg-slate-50 border rounded-lg text-sm mb-4" 
                                        value={apiKey} 
                                        onChange={(e)=>setApiKey(e.target.value)} 
                                    />
                                    <h3 className="font-bold mb-4 flex items-center gap-2"><IconWrapper icon={Plus} className="w-4 h-4 text-indigo-600" /> 構成追加</h3>
                                    <input 
                                        type="text" 
                                        placeholder="目標（例: 受動態）" 
                                        className="w-full p-3 bg-slate-50 border rounded-xl mb-4" 
                                        value={currentTarget} 
                                        onChange={(e)=>setCurrentTarget(e.target.value)} 
                                    />
                                    <div className="grid gap-1 mb-4">
                                        {questionTypes.map((t) => (
                                            <button 
                                                key={t.id} 
                                                onClick={() => setCurrentType(t.id)} 
                                                className={`flex items-center gap-2 p-2 rounded-lg border text-sm ${currentType === t.id ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600'}`}
                                            >
                                                <IconWrapper icon={t.icon} className="w-4 h-4" />{t.label}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="number" className="w-16 p-2 border rounded-xl" value={currentCount} onChange={(e)=>setCurrentCount(e.target.value)} />
                                        <button onClick={addTestSet} className="flex-1 bg-indigo-50 text-indigo-600 font-bold rounded-xl">追加</button>
                                    </div>
                                </div>
                                <button 
                                    onClick={generateBulkTest} 
                                    disabled={loading}
                                    className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold flex justify-center items-center gap-2"
                                >
                                    {loading ? <IconWrapper icon={Loader2} className="animate-spin" /> : <IconWrapper icon={Send} />}
                                    作成開始
                                </button>
                                {error && <div className="text-red-500 text-xs p-3 bg-red-50 rounded-lg">{error}</div>}
                            </aside>

                            <main className="lg:col-span-2 space-y-6">
                                <div className="bg-white p-4 rounded-2xl border">
                                    <h3 className="text-[10px] font-bold text-slate-400 uppercase mb-4">構成リスト</h3>
                                    {testSets.length === 0 && <p className="text-sm text-slate-400 italic">構成を追加してください</p>}
                                    {testSets.map((s, i) => (
                                        <div key={s.id} className="flex items-center gap-2 p-2 bg-slate-50 rounded-lg mb-2 text-sm">
                                            <span className="font-bold text-indigo-600">[{s.typeLabel}]</span>
                                            <span className="flex-1">{s.target} ({s.count}問)</span>
                                            <button onClick={() => removeTestSet(s.id)} className="text-slate-300 hover:text-red-500"><IconWrapper icon={Trash2} className="w-4 h-4" /></button>
                                        </div>
                                    ))}
                                </div>

                                {results && (
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center bg-indigo-600 p-4 rounded-2xl text-white">
                                            <span className="font-bold">生成完了</span>
                                            <button onClick={downloadAsTxt} className="bg-white text-indigo-600 px-4 py-1 rounded-full text-xs font-bold">TXT保存</button>
                                        </div>
                                        {results.sections.map((sec, i) => (
                                            <div key={i} className="bg-white p-6 rounded-2xl border shadow-sm">
                                                <h4 className="text-xs font-bold text-indigo-5
