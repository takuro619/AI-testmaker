<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIテストメーカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-8">
            <div class="bg-indigo-600 p-2 rounded-lg shadow-lg shadow-indigo-200">
                <i class="fa-solid fa-list-check text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">AIテストメーカー</h1>
                <p class="text-sm text-slate-500">一括作成 & WebClass CSV対応</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sidebar: Controls -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <h3 class="font-bold mb-4 flex items-center gap-2 text-slate-800">
                        <i class="fa-solid fa-plus text-indigo-600 text-sm"></i>
                        構成の追加
                    </h3>
                    <div class="space-y-4">
                        <input type="text" id="target-input" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="目標（例: 現在完了形）">
                        
                        <div id="type-buttons" class="grid grid-cols-1 gap-1.5">
                            <!-- Buttons generated by JS -->
                        </div>

                        <div class="flex items-center gap-3">
                            <input type="number" id="count-input" class="flex-1 p-2.5 bg-slate-50 border rounded-xl outline-none" value="5">
                            <button id="add-set-btn" class="bg-indigo-50 text-indigo-600 p-3 rounded-xl hover:bg-indigo-100 transition-colors">
                                <i class="fa-solid fa-plus text-xl"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <button id="generate-btn" class="w-full bg-slate-900 hover:bg-black disabled:bg-slate-300 text-white font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-slate-200">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span>テストを一括作成</span>
                </button>
                <div id="error-msg" class="hidden text-red-600 text-xs bg-red-50 p-3 rounded-xl border border-red-100 flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span></span>
                </div>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Config List -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden p-4">
                    <h3 class="font-bold text-slate-700 text-sm mb-4 flex justify-between items-center">
                        構成リスト（並べ替え可能）
                        <span id="section-count" class="bg-slate-100 px-2 py-0.5 rounded text-[10px] text-slate-500 font-bold uppercase">0 SECTIONS</span>
                    </h3>
                    <div id="test-sets-container" class="space-y-2">
                        <p class="text-center py-10 text-slate-400 text-sm italic">構成を追加してください</p>
                    </div>
                </div>

                <!-- Results Area -->
                <div id="results-area" class="hidden space-y-6 animate-in">
                    <div class="flex flex-wrap gap-2 justify-between items-center bg-indigo-600 p-4 rounded-2xl shadow-lg text-white">
                        <h2 class="text-sm font-bold flex items-center gap-2"><i class="fa-solid fa-circle-check text-lg"></i>生成完了</h2>
                        <div class="flex gap-2">
                            <button id="dl-txt-btn" class="flex items-center gap-2 text-xs font-bold text-indigo-600 bg-white px-4 py-2 rounded-full hover:bg-slate-50 transition-colors">
                                <i class="fa-solid fa-download"></i>TXT保存
                            </button>
                            <button id="dl-csv-btn" class="flex items-center gap-2 text-xs font-bold text-white bg-indigo-500 px-4 py-2 rounded-full hover:bg-indigo-400 border border-indigo-400 transition-colors">
                                <i class="fa-solid fa-file-code"></i>WebClass用 CSV
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="bg-slate-900 text-white p-5 text-center font-bold tracking-widest uppercase text-xs">Questions Preview</div>
                        <div id="preview-container" class="p-8 space-y-12"></div>
                    </div>

                    <div class="bg-slate-50 rounded-3xl border border-slate-200 overflow-hidden">
                        <div class="bg-white border-b p-5 text-center font-bold text-slate-400 text-[10px] tracking-widest uppercase">Answers & Explanations</div>
                        <div id="answers-container" class="p-8 space-y-8"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = ""; 
        let testSets = [];
        let currentType = "fill_blank";
        let resultsData = null;

        const questionTypes = [
            { id: 'reorder', label: '整序', icon: 'fa-list-ol' },
            { id: 'fill_blank', label: '穴埋め', icon: 'fa-font' },
            { id: 'translation_en', label: '和文英訳', icon: 'fa-pen-clip' },
            { id: 'translation_jp', label: '日本語訳', icon: 'fa-language' },
            { id: 'multiple_choice', label: '穴埋め(4択)', icon: 'fa-arrow-pointer' },
        ];

        function initTypeButtons() {
            const container = document.getElementById('type-buttons');
            container.innerHTML = questionTypes.map(type => `
                <button onclick="setType('${type.id}')" id="btn-${type.id}" class="type-btn flex items-center gap-2.5 p-2.5 rounded-lg border text-sm transition-all bg-white text-slate-600 hover:border-indigo-300">
                    <i class="fa-solid ${type.icon} w-4"></i>${type.label}
                </button>
            `).join('');
            updateTypeUI();
        }

        function setType(id) {
            currentType = id;
            updateTypeUI();
        }

        function updateTypeUI() {
            document.querySelectorAll('.type-btn').forEach(btn => {
                const isSelected = btn.id === `btn-${currentType}`;
                btn.classList.toggle('bg-indigo-600', isSelected);
                btn.classList.toggle('border-indigo-600', isSelected);
                btn.classList.toggle('text-white', isSelected);
                btn.classList.toggle('shadow-md', isSelected);
                btn.classList.toggle('bg-white', !isSelected);
                btn.classList.toggle('text-slate-600', !isSelected);
            });
        }

        function addTestSet() {
            const targetInput = document.getElementById('target-input');
            const countInput = document.getElementById('count-input');
            const target = targetInput.value.trim();
            const count = countInput.value || 5;

            if (!target) {
                showError("目標を入力してください。");
                return;
            }

            const typeObj = questionTypes.find(t => t.id === currentType);
            testSets.push({
                id: crypto.randomUUID(),
                target,
                typeId: currentType,
                typeLabel: typeObj.label,
                count
            });

            targetInput.value = "";
            showError(null);
            renderSets();
        }

        function removeSet(id) {
            testSets = testSets.filter(s => s.id !== id);
            renderSets();
        }

        function moveSet(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= testSets.length) return;
            const temp = testSets[index];
            testSets[index] = testSets[targetIndex];
            testSets[targetIndex] = temp;
            renderSets();
        }

        function renderSets() {
            const container = document.getElementById('test-sets-container');
            const countBadge = document.getElementById('section-count');
            countBadge.innerText = `${testSets.length} SECTIONS`;

            if (testSets.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-slate-400 text-sm italic">構成を追加してください</p>`;
                return;
            }

            container.innerHTML = testSets.map((set, index) => `
                <div class="flex items-center gap-2 p-3 bg-slate-50 rounded-xl border border-slate-100 animate-in">
                    <div class="flex flex-col gap-0.5">
                        <button onclick="moveSet(${index}, -1)" ${index === 0 ? 'disabled' : ''} class="p-0.5 text-slate-300 hover:text-indigo-600 disabled:opacity-0">
                            <i class="fa-solid fa-chevron-up text-xs"></i>
                        </button>
                        <button onclick="moveSet(${index}, 1)" ${index === testSets.length - 1 ? 'disabled' : ''} class="p-0.5 text-slate-300 hover:text-indigo-600 disabled:opacity-0">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </button>
                    </div>
                    <div class="flex-1 text-sm flex items-center">
                        <span class="font-bold text-indigo-600 mr-2 min-w-[3.5rem]">[${set.typeLabel}]</span>
                        <span class="font-medium text-slate-700 truncate">${set.target}</span>
                        <span class="ml-auto text-[10px] bg-white border px-1.5 py-0.5 rounded text-slate-400 font-bold uppercase">${set.count} Qs</span>
                    </div>
                    <button onclick="removeSet('${set.id}')" class="text-slate-300 hover:text-red-500 p-1">
                        <i class="fa-solid fa-trash-can text-sm"></i>
                    </button>
                </div>
            `).join('');
        }

        async function generateBulkTest() {
            if (testSets.length === 0) {
                showError("少なくとも1つのテスト設定を追加してください。");
                return;
            }

            const btn = document.getElementById('generate-btn');
            const btnText = btn.querySelector('span');
            const btnIcon = btn.querySelector('i');
            
            setLoading(true);
            showError(null);

            const systemPrompt = `あなたは優秀な語学教師です。 各問題には必ずその問題文の「日本語訳 (translation)」を含めてください。
【重要ルール】
- translation（日本語訳）には、( ) や （ ） などの記号を一切含めないでください。自然な日本語の一文として記述してください。
- 形式が「整序」の場合、textには並べ替える単語群を [word1 / word2 / word3] の形式で記述してください。
- 整序問題の単語リストは、必ず正解の順序とは異なる「ランダムな順序」で出力してください。
- 【重要】4択問題（multiple_choice）の場合、optionsには正解を含む4つの選択肢を含めてください。options内での正解の配置は、問題ごとにランダムに入れ替えて出力してください（常に1番目が正解にならないように）。
- answer（解答）はピリオドを含めた完全な英文にしてください。
JSON構造: { "sections": [ { "sectionTitle": "タイトル", "type": "reorder" | "other", "questions": [...] } ] }`;

            const userPrompt = testSets.map((s, i) => `セクション${i+1}: 目標「${s.target}」、形式「${s.typeLabel}」、問題数「${s.count}問」、形式ID「${s.typeId}」`).join("\n");

            let retries = 0;
            while (retries < 5) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userPrompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        sections: {
                                            type: "ARRAY",
                                            items: {
                                                type: "OBJECT",
                                                properties: {
                                                    sectionTitle: { type: "STRING" },
                                                    type: { type: "STRING" },
                                                    questions: {
                                                        type: "ARRAY",
                                                        items: {
                                                            type: "OBJECT",
                                                            properties: {
                                                                id: { type: "NUMBER" },
                                                                text: { type: "STRING" },
                                                                translation: { type: "STRING" },
                                                                answer: { type: "STRING" },
                                                                options: { type: "ARRAY", items: { type: "STRING" } },
                                                                explanation: { type: "STRING" }
                                                            },
                                                            required: ["id", "text", "translation", "answer", "explanation"]
                                                        }
                                                    }
                                                },
                                                required: ["sectionTitle", "questions", "type"]
                                            }
                                        }
                                    },
                                    required: ["sections"]
                                }
                            }
                        })
                    });

                    if (!response.ok) throw new Error("API request failed");
                    const data = await response.json();
                    resultsData = JSON.parse(data.candidates[0].content.parts[0].text);
                    renderResults();
                    setLoading(false);
                    return;
                } catch (err) {
                    retries++;
                    if (retries === 5) {
                        showError("生成に失敗しました。APIキーを確認してください。");
                        setLoading(false);
                    } else {
                        await new Promise(res => setTimeout(res, Math.pow(2, retries) * 1000));
                    }
                }
            }

            function setLoading(val) {
                btn.disabled = val;
                btnText.innerText = val ? "AI生成中..." : "テストを一括作成";
                btnIcon.className = val ? "fa-solid fa-spinner animate-spin" : "fa-solid fa-paper-plane";
            }
        }

        function renderResults() {
            const resultsArea = document.getElementById('results-area');
            const previewContainer = document.getElementById('preview-container');
            const answersContainer = document.getElementById('answers-container');

            resultsArea.classList.remove('hidden');
            previewContainer.innerHTML = resultsData.sections.map((section, sIdx) => {
                const isReorder = section.type === "reorder" || section.sectionTitle.includes("整序");
                return `
                    <div>
                        <h4 class="font-bold text-slate-400 text-[10px] mb-6 border-b pb-1 uppercase tracking-tighter">${section.sectionTitle}</h4>
                        <div class="space-y-8">
                            ${section.questions.map((q, idx) => `
                                <div class="space-y-2">
                                    <div class="flex gap-4">
                                        <span class="text-indigo-600 font-black text-sm">${idx + 1}.</span>
                                        <div class="space-y-3 flex-1">
                                            <div class="p-3 bg-indigo-50 rounded-xl border border-indigo-100">
                                                <p class="text-xs text-indigo-400 font-bold mb-1 uppercase tracking-wider">和訳</p>
                                                <p class="text-indigo-900 font-medium">${q.translation}</p>
                                            </div>
                                            <p class="text-slate-800 font-bold leading-relaxed pl-1">
                                                ${q.text}${isReorder ? '.' : ''}
                                            </p>
                                            ${q.options ? `
                                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-3">
                                                    ${q.options.map((opt, oi) => `
                                                        <div class="text-xs p-3 bg-slate-50 rounded-xl border border-slate-100 text-slate-600">
                                                            <span class="font-bold opacity-30 mr-2">${String.fromCharCode(97 + oi)})</span> ${opt}
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            answersContainer.innerHTML = resultsData.sections.map((section, sIdx) => `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${section.questions.map((q, idx) => `
                        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                            <span class="text-[9px] font-bold text-slate-300">PART ${sIdx+1} - NO. ${idx+1}</span>
                            <p class="font-bold text-indigo-700 my-1 text-lg">${q.answer}</p>
                            <p class="text-[11px] text-slate-500 leading-relaxed border-t border-slate-50 pt-2">${q.explanation}</p>
                        </div>
                    `).join('')}
                </div>
            `).join('');
            
            resultsArea.scrollIntoView({ behavior: 'smooth' });
        }

        function downloadTxt() {
            if (!resultsData) return;
            let content = "===== テスト問題（和訳先提示形式） =====\n\n";
            resultsData.sections.forEach(s => {
                content += `【${s.sectionTitle}】\n`;
                const isReorder = s.type === "reorder" || s.sectionTitle.includes("整序");
                s.questions.forEach((q, i) => {
                    content += `${i + 1}. ${q.translation}\n   > ${q.text}${isReorder ? '.' : ''}\n`;
                    if (q.options) q.options.forEach((opt, oi) => content += `   ${String.fromCharCode(97 + oi)}) ${opt}\n`);
                });
                content += "\n";
            });
            content += "\n===== 解答・解説集 =====\n\n";
            resultsData.sections.forEach(s => {
                content += `【${s.sectionTitle} - 解答】\n`;
                s.questions.forEach((q, i) => {
                    content += `${i + 1}. 正解: ${q.answer}\n   解説: ${q.explanation}\n\n`;
                });
            });
            triggerDownload(content, `test_paper_${Date.now()}.txt`, 'text/plain');
        }

        function downloadWebClassCsv() {
            if (!resultsData) return;
            const headers = ["point", "area", "difficulty", "style", "answer", "question", "description", ...Array.from({ length: 26 }, (_, i) => `option${i + 1}`)];
            let csvRows = [headers.join(",")];

            resultsData.sections.forEach(s => {
                const isReorder = s.type === "reorder" || s.sectionTitle.includes("整序");
                s.questions.forEach(q => {
                    const isMultiple = q.options && q.options.length > 0;
                    const style = isMultiple ? "radio" : "text";
                    const qTextDisplay = isReorder ? `${q.text}.` : q.text;
                    const fullQuestionText = `"${q.translation}\n${qTextDisplay}"`;
                    const description = `"${q.explanation}"`;
                    
                    let answerStr = "";
                    let options = Array(26).fill("");
                    
                    if (isMultiple) {
                        // オプションの中から正解文字列に最も近いインデックスを探す
                        const correctIdx = q.options.findIndex(opt => {
                            const cleanOpt = opt.trim().toLowerCase();
                            const cleanAns = q.answer.trim().toLowerCase();
                            // 完全一致、またはピリオド有無の違いのみを許容
                            return cleanOpt === cleanAns || 
                                   cleanOpt === cleanAns.replace(/\.$/, "") ||
                                   cleanOpt.replace(/\.$/, "") === cleanAns;
                        }) + 1;
                        
                        answerStr = correctIdx > 0 ? correctIdx.toString() : "1";
                        q.options.forEach((opt, idx) => { if (idx < 26) options[idx] = `"${opt}"`; });
                    } else {
                        const plainAnswer = q.answer.trim();
                        const noPeriod = plainAnswer.endsWith('.') ? plainAnswer.slice(0, -1) : plainAnswer;
                        const withPeriod = plainAnswer.endsWith('.') ? plainAnswer : plainAnswer + '.';
                        answerStr = isReorder ? `"${withPeriod} or ${noPeriod}"` : `"${noPeriod}"`;
                    }

                    csvRows.push(["10", `"${s.sectionTitle}"`, "C", style, answerStr, fullQuestionText, description, ...options].join(","));
                });
            });

            triggerDownload("\uFEFF" + csvRows.join("\n"), `webclass_import_${Date.now()}.csv`, 'text/csv');
        }

        function triggerDownload(content, fileName, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            link.click();
            URL.revokeObjectURL(url);
        }

        function showError(msg) {
            const errDiv = document.getElementById('error-msg');
            if (msg) {
                errDiv.querySelector('span').innerText = msg;
                errDiv.classList.remove('hidden');
            } else {
                errDiv.classList.add('hidden');
            }
        }

        document.getElementById('add-set-btn').onclick = addTestSet;
        document.getElementById('generate-btn').onclick = generateBulkTest;
        document.getElementById('dl-txt-btn').onclick = downloadTxt;
        document.getElementById('dl-csv-btn').onclick = downloadWebClassCsv;

        window.onload = initTypeButtons;
    </script>
</body>
</html>
